{% extends "master.html" %}

{% block content %}
  <h1>{{ message }}</h1>
  {% if score > 85 %}
  <h1>Grade A</h1>
  {% endif %}

  {% if score > 75 and score < 85 %}
  <h1>Grade B+</h1>
  {% endif %}

  <ul>
    {% for x in activities %}
    <li>{{ x }}</li>
    {% endfor %}
  </ul>


<h2>Real-Time Clock (AJAX)</h2>
<h1 id="datetime">Loading...</h1>

<script>
function loadDateTime() {
    fetch('/api/servertime')
        .then(response => response.json())
        .then(data => {
            document.getElementById('datetime').innerText = data.datetime;
        })
        .catch(error => console.error(error));
}
// Run every 1 second
setInterval(loadDateTime, 1000);
// Initial load
loadDateTime();
</script>
{% endblock %}
